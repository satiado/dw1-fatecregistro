<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Introdução aos tipos de Formulários:</h1>

    <form action="">
        <!-- Campo de formulário -->
         <input type="text">
         <input type="email" name="email" required placeholder="exemplo@gmail.com">
         <input type="password">
         <input type="number">
         <input type="date">
         <input type="radio">
         <input type="checkbox">
    </form>

    <!-- Texto explicativo de um campo do formulário -->
    <label for="nome">Nome:</label>
    <input type="text" name="nome" id="nome">

    <input type="radio" value="m" name="sexo">Masculino
    <input type="radio" value="f" name="sexo">Feminino
    
</body>
</html>
