<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro de Aluno - Curso DSM </title>
</head>
<body>
    <h1>Cadastro de Aluno - DSM</h1>
    <p>Este é um formulário para cadastrar novos alunos do curso de DSM</p>

    <form action="#" method="post">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome:</label>
            <input type="text" required name="nome" id="nome">
            <br><br>
            <label for="email">E-mail:</label>
            <input type="email" required name="email" id="email">
            <br><br>
            <label for="nascimento">Data de Nascimento:</label>
            <input type="date" required name="nascimento" id="nascimento">
        </fieldset>
        <fieldset>
            <legend>Dados Acadêmicos</legend>
            <label for="curso">Curso:</label>
            <select name="curso" id="curso">
                <option value="dsm">DSM</option>
                <option value="ads">ADS</option>
                <option value="gestao">Gestão</option>
            </select>
            <br><br>
            <label for="periodo">Período:</label>
            <input type="radio" name="periodo" id="manha" value="m">Manhã
            <input type="radio" name="periodo" id="noite" value="n">Noite
            <br><br>
            <label for="observacoes">Observações:</label>
            <textarea cols="30" rows="5" name="observacoes" id="observacoes" placeholder="Escreva aqui suas observações"></textarea>
            <br><br>
            <button type="submit">Enviar</button>
            <button type="reset">Excluir</button>
        </fieldset>
    </form>
    
</body>
</html>
