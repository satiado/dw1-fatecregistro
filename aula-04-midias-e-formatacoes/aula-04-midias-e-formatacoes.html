<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de fotos</title>
</head>
<body>
    <header>
        <h1>Galeria de fotos</h1>
    </header>
    <main>
        <section>
            <!-- Importando imagem local -->
            <img src="midias/imagem.jpg"  alt="Paisagem" width="300px" height="300px">
            <br><br><br>

            <!-- Importando imagem externa -->
            <img src="https://picsum.photos/id/99/300/200" alt="imagem 01">
            <img src="https://picsum.photos/id/98/300/200" alt="imagem 02">
            <img src="https://picsum.photos/id/89/300/200" alt="imagem 03">
            <img src="https://picsum.photos/id/96/300/200" alt="imagem 04">
            <img src="https://picsum.photos/id/95/300/200" alt="imagem 05">
            <img src="https://picsum.photos/id/94/300/200" alt="imagem 06">
            <img src="https://picsum.photos/id/93/300/200" alt="imagem 07">
            <img src="https://picsum.photos/id/92/300/200" alt="imagem 08">
            <img src="https://picsum.photos/id/91/300/200" alt="imagem 09">
            <img src="https://picsum.photos/id/90/300/200" alt="imagem 10">
        </section>
        <br><br>
            <!-- Imagem com legenda -->
             
        <section>
            <figure>
                <img src="midias/grafico.png" alt="Gráfico de crescimento anual de empresa" width="300px">
                <figcaption>Gráfico de crescimento da empresa no ano de 2025</figcaption>
            </figure>
        </section>
    </main>
    <br>

    <footer>
        <p><em>&copy; 2026 - FATEC Registro - DSM</em></p>
    </footer>
</body>
</html>
