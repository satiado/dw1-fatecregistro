<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outras mídias no HTML 5</title>
</head>
<body>
    <header>
        <h1>Outras mídias no HTML 5</h1>
    </header>

    <main>
        <section>
            <h2>Áudio</h2>
            <audio controls src="midias/audio.mp3"></audio>

            <h2>Vídeos</h2>
            <video controls src="midias/video.mp4" type="video/mp4">Vídeo não encontrado ou não importado</video>

            <h2>Vídeo do youtube (externo) - iframe</h2>
            <iframe
             src="https://www.youtube.com/watch?v=71uWvXibKsc"
             title="Exemplo de vídeo do Youtube"
             width="560px"
             height="315"
              frameborder="0">
            </iframe>

            <iframe
             src="https://www.youtube.com/watch?v=Dm2szGOzbGs"
             title="Exemplo de vídeo do Youtube"
             width="560px"
             height="315"
              frameborder="0">
            </iframe>

        </section>
    </main>
</body>
</html>
