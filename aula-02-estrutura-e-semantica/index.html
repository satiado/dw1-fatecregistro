<!-- Estrutura básica HTML -->
<!doctype html>
<!-- Diz ao navegador para utilizar a útima versão do HTML  -->
<html lang="pt-br">
  <!-- Atributo lang informa o idioma do site -->
  <head>
    <!-- charset indica o conjunto de caracteres -->
    <meta charset="UTF-8" />
    <!-- Permite apresentar uam melhor apresentação em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale-1.0" />
    <!-- Título exibido na barra do navegador  -->
    <title>Meu Website</title>
  </head>
  <!-- Conteúdo de site - o que o usuário irá visualizar -->
  <body>
    <h1>Meu site</h1>
    <p>Bem Vindo ao meu site</p>
  </body>
</html>
